<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PE Unit & Team Manager</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        h1, h2, h3, h4 { margin-top: 0; }
        .grid-container { display: grid; grid-template-columns: 320px 1fr; gap: 20px; align-items: start; }
        .panel { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.9em; }
        select, input[type="text"], input[type="number"], input[type="password"] { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        input[type="checkbox"] { width: auto; margin-right: 8px; }
        button { background: #0056b3; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 10px; transition: 0.2s; }
        button:hover { background: #004494; }
        button.btn-secondary { background: #6c757d; }
        button.btn-success { background: #28a745; }
        button.btn-github { background: #24292e; color: white; }
        button.btn-outline { background: white; color: #333; border: 1px solid #ccc; }
        
        /* New Styles for Team Selector */
        #teamSelectionList { 
            background: #f8f9fa; 
            padding: 10px; 
            border-radius: 4px; 
            border: 1px solid #ddd;
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 15px;
        }
        .team-option { display: flex; align-items: center; margin-bottom: 5px; font-size: 0.9em; }
        .team-option input { margin-right: 10px; }

        .teams-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .league-section { background: #e9ecef; padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 5px solid #6c757d; }
        .league-comp { border-left-color: #dc3545; background: #f8d7da; }
        .league-rec { border-left-color: #28a745; background: #d4edda; }
        .team-box { border: 2px solid #ced4da; border-radius: 6px; overflow: hidden; background: #fff; }
        .team-header { background: #343a40; color: white; padding: 10px; display: flex; flex-direction: column; gap: 5px; }
        .team-header input { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.5); color: white; font-weight: bold; padding: 4px; border-radius: 3px; font-size: 1.1em; }
        .team-list { padding: 0; margin: 0; list-style: none; min-height: 50px; }
        .player-item { display: flex; justify-content: space-between; padding: 8px 10px; border-bottom: 1px solid #eee; align-items: center; font-size: 0.9em; }
        .btn-status { padding: 4px 8px; border: none; border-radius: 4px; cursor: pointer; font-size: 0.8em; font-weight: bold; width: auto; margin: 0; }
        .btn-present { background: #e2e3e5; color: #383d41; }
        .btn-absent { background: #f8d7da; color: #721c24; }
        .btn-swap { background: #17a2b8; color: white; margin-right: 5px; }
        .shifted-in { background-color: #fff3cd; border-left: 4px solid #ffc107; }
        .absent-text { text-decoration: line-through; color: #dc3545; }

        @media print {
            .no-print { display: none !important; }
            .grid-container { display: block; }
            .panel { box-shadow: none; border: none; }
        }
    </style>
</head>
<body>

    <h1 class="no-print">PE Unit & Team Manager</h1>

    <div class="grid-container">
        <div class="no-print">
            <div class="panel" style="background: #e8f0fe; border: 1px solid #b6d4fe;">
                <h3>⚙️ GitHub API Settings</h3>
                <div class="form-group">
                    <label>Personal Access Token:</label>
                    <input type="password" id="ghToken" placeholder="ghp_xxxxxxxxxxxx...">
                </div>
                <div class="form-group">
                    <label>Save Folder Path:</label>
                    <input type="text" id="ghFolder" placeholder="e.g., units/" value="units/">
                </div>
                <div style="display: flex; gap: 10px;">
                    <button class="btn-success" style="flex: 1;" onclick="saveGitHubCredentials()">Save Locally</button>
                    <button class="btn-secondary" style="flex: 1;" onclick="testGitHubToken()">🔍 Test</button>
                </div>
                <div id="githubDebug" style="background: #1e1e1e; color: #00ff00; padding: 10px; font-family: monospace; font-size: 0.8em; margin-top: 10px; border-radius: 4px; display: none; white-space: pre-wrap;"></div>
            </div>

            <div class="panel">
                <h3>1. Load Master Roster</h3>
                <div class="form-group">
                    <label>GitHub Raw URL:</label>
                    <input type="text" id="githubUrl" value="https://raw.githubusercontent.com/scottscalici/PE/main/players.json">
                </div>
                <button onclick="fetchFromGitHub()">Fetch Players</button>
                <div id="fileStatus" style="font-size: 0.85em; color: green; display: none; margin-top: 10px;">✓ Roster Loaded</div>
            </div>

            <div class="panel" id="unitBuilderPanel" style="opacity: 0.5; pointer-events: none;">
                <h3>2. Build New Unit</h3>
                <div class="form-group">
                    <label>Unit Name</label>
                    <input type="text" id="unitName" placeholder="e.g., Soccer 2024">
                </div>
                <div class="form-group">
                    <label>Sport / Game Type</label>
                    <select id="sportType" onchange="fetchSportMaster()">
                        <option value="">-- Select Sport --</option>
                        <option value="handball">Handball</option>
                        <option value="backwards_soccer">Backwards Soccer</option>
                        <option value="football">American Football</option>
                        <option value="volleyball">Volleyball</option>
                        <option value="basketball">Basketball</option>
                    </select>
                </div>

                <div id="teamSelectorContainer" style="display:none;">
                    <label style="font-weight:bold; font-size:0.9em;">Select Teams to Use:</label>
                    <div id="teamSelectionList">
                        </div>
                </div>

                <div class="form-group">
                    <label>Target Class</label>
                    <select id="classSelect"></select>
                </div>
                
                <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">
                
                <div class="form-group">
                    <label style="display: flex; align-items: center;">
                        <input type="checkbox" id="splitLeagues" onchange="toggleLeagueOptions()"> 
                        Split into Comp/Rec Leagues?
                    </label>
                </div>

                <div id="leagueOptions" style="display: none; background: #f8f9fa; padding: 10px; border-radius: 5px;">
                    <div class="form-group">
                        <label>Compete Threshold (1-5)</label>
                        <input type="number" id="competeThreshold" value="4" min="2" max="5">
                    </div>
                </div>

                <button onclick="generateNewUnit()">Generate Teams</button>
            </div>

            <div class="panel">
                <h3>3. Load Saved Unit Config</h3>
                <button class="btn-secondary" onclick="fetchGitHubFilesList()">🔄 Refresh List</button>
                <div class="form-group">
                    <select id="githubUnitsSelect">
                        <option value="">-- Click Refresh List first --</option>
                    </select>
                </div>
                <button class="btn-success" onclick="loadSelectedGitHubUnit()">📥 Load Selected Unit</button>
            </div>
        </div>

        <div class="panel">
            <div class="workspace-controls" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 id="workspaceTitle">Workspace (No Unit Loaded)</h2>
                <div style="display: flex; gap: 5px;" class="no-print">
                    <button class="btn-outline" style="width: auto; display: none;" id="undoSwapBtn" onclick="undoLastSwap()">↩️ Undo Swap</button>
                    <button class="btn-github" style="width: auto;" id="githubSaveBtn" onclick="pushToGitHubRepo()">☁️ Push to GitHub</button>
                    <button class="btn-outline" style="width: auto;" onclick="window.print()">🖨️ Print</button>
                </div>
            </div>
            <div id="teamsContainer"></div>
        </div>
    </div>

    <script>
        let allPlayerData = {}; 
        let currentUnit = null; 
        let absentIds = new Set(); 
        let sportTeamsMaster = []; // Teams fetched from [sport].json
        
        let pendingSwap = null; 
        let swapHistory = []; 

        function logDebug(msg) {
            const box = document.getElementById('githubDebug');
            box.style.display = 'block';
            box.innerText += msg + "\n";
        }

        function loadGitHubCredentials() {
            const token = localStorage.getItem('pe_gh_token') || '';
            const folder = localStorage.getItem('pe_gh_folder') || 'units/';
            document.getElementById('ghToken').value = token;
            document.getElementById('ghFolder').value = folder;
        }

        function saveGitHubCredentials() {
            localStorage.setItem('pe_gh_token', document.getElementById('ghToken').value.trim());
            localStorage.setItem('pe_gh_folder', document.getElementById('ghFolder').value.trim());
            alert("Credentials saved locally!");
        }

        // FETCH THE MASTER JSON FOR THE SELECTED SPORT
        async function fetchSportMaster() {
            const sport = document.getElementById('sportType').value;
            const container = document.getElementById('teamSelectorContainer');
            const list = document.getElementById('teamSelectionList');
            
            if (!sport) {
                container.style.display = 'none';
                return;
            }

            // Using your consistent path logic: teams/[sport]/[sport].json
            const url = `https://raw.githubusercontent.com/scottscalici/PE/main/teams/${sport}/${sport}.json`;
            
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error("Master sport file not found.");
                const data = await response.json();
                
                // Assuming your master JSON has a "teams" array or similar
                sportTeamsMaster = data.available_teams || data.teams || [];
                
                list.innerHTML = '';
                sportTeamsMaster.forEach(team => {
                    const div = document.createElement('div');
                    div.className = 'team-option';
                    div.innerHTML = `<input type="checkbox" name="teamChoice" value="${team.id}" data-display="${team.display || team.name}"> ${team.display || team.name}`;
                    list.appendChild(div);
                });
                
                container.style.display = 'block';
            } catch (err) {
                console.error(err);
                container.style.display = 'none';
                alert("Could not load master team list for " + sport);
            }
        }

        async function fetchFromGitHub() {
            const url = document.getElementById('githubUrl').value.trim();
            try {
                const response = await fetch(url);
                allPlayerData = await response.json();
                const classSelect = document.getElementById('classSelect');
                classSelect.innerHTML = '';
                for (const classId in allPlayerData) {
                    classSelect.innerHTML += `<option value="${classId}">${classId}</option>`;
                }
                document.getElementById('fileStatus').style.display = 'block';
                document.getElementById('unitBuilderPanel').style.opacity = '1';
                document.getElementById('unitBuilderPanel').style.pointerEvents = 'auto';
            } catch (error) { alert("Error: " + error.message); }
        }

        function toggleLeagueOptions() {
            const isChecked = document.getElementById('splitLeagues').checked;
            document.getElementById('leagueOptions').style.display = isChecked ? 'block' : 'none';
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function getAverageSkill(playerArray) {
            if (playerArray.length === 0) return 0;
            return playerArray.reduce((sum, p) => sum + p.skill, 0) / playerArray.length;
        }

        function generateNewUnit() {
            const unitName = document.getElementById('unitName').value.trim();
            const classId = document.getElementById('classSelect').value;
            const sportType = document.getElementById('sportType').value;
            const useLeagues = document.getElementById('splitLeagues').checked;

            // Get selected teams from checkboxes
            const selectedBoxes = Array.from(document.querySelectorAll('input[name="teamChoice"]:checked'));
            if (selectedBoxes.length < 2) return alert("Please select at least 2 teams from the list.");

            let players = allPlayerData[classId].players.map(p => ({
                id: p.id, name: p.name, skill: parseInt(p.skill), compete: parseInt(p.compete), gender: p.gender || 'M' 
            }));

            // Shuffle players
            shuffleArray(players);

            // Assign players to selected teams
            let teams = selectedBoxes.map((box, i) => {
                const masterTeam = sportTeamsMaster.find(t => t.id == box.value);
                return {
                    id: i + 1,
                    name: box.getAttribute('data-display'),
                    logo_id: box.value, // This is the 'fuches' or 'lowen' ID
                    league: "Standard",
                    players: []
                };
            });

            // Logic to split leagues if checked
            if (useLeagues) {
                let threshold = parseInt(document.getElementById('competeThreshold').value);
                let compPlayers = players.filter(p => p.compete >= threshold);
                let recPlayers = players.filter(p => p.compete < threshold);
                
                // For simplicity in this generator, we split the selected teams half/half
                let mid = Math.ceil(teams.length / 2);
                teams.forEach((t, i) => t.league = i < mid ? "Competitive" : "Recreational");

                // Distribute players
                let cIdx = 0, rIdx = 0;
                let cTeams = teams.filter(t => t.league === "Competitive");
                let rTeams = teams.filter(t => t.league === "Recreational");

                compPlayers.forEach(p => { cTeams[cIdx].players.push(p); cIdx = (cIdx + 1) % cTeams.length; });
                recPlayers.forEach(p => { rTeams[rIdx].players.push(p); rIdx = (rIdx + 1) % rTeams.length; });
            } else {
                players.forEach((p, i) => { teams[i % teams.length].players.push(p); });
            }

            currentUnit = {
                unit_id: "U_" + Date.now(),
                unit_name: unitName,
                sport_type: sportType,
                class_id: classId,
                has_leagues: useLeagues,
                baseTeams: teams
            };
            
            resetWorkspace();
            document.getElementById('workspaceTitle').innerText = getDisplayTitle(currentUnit);
            updateBoard();
        }

        // (The rest of your utility functions: updateBoard, pushToGitHub, etc. remain the same)
        // Note: updateBoard needs to handle rendering currentUnit.baseTeams correctly.
        
        function updateBoard() {
            if (!currentUnit) return;
            const container = document.getElementById('teamsContainer');
            container.innerHTML = '';
            
            let leagues = [...new Set(currentUnit.baseTeams.map(t => t.league))];
            leagues.forEach(league => {
                let html = `<div class="league-section"><h4>${league}</h4><div class="teams-grid">`;
                currentUnit.baseTeams.filter(t => t.league === league).forEach(team => {
                    html += `
                        <div class="team-box">
                            <div class="team-header">
                                <input type="text" value="${team.name}" onchange="updateTeamName(${team.id}, this.value)">
                                <div style="font-size:0.7em; opacity:0.8">Logo ID: ${team.logo_id}</div>
                            </div>
                            <ul class="team-list">
                                ${team.players.map(p => `<li class="player-item">${p.name}</li>`).join('')}
                            </ul>
                        </div>`;
                });
                html += `</div></div>`;
                container.innerHTML += html;
            });
        }

        function updateTeamName(id, val) { 
            let t = currentUnit.baseTeams.find(t => t.id === id); 
            if(t) t.name = val; 
        }

        function resetWorkspace() { absentIds.clear(); swapHistory = []; }
        function getDisplayTitle(u) { return `${u.unit_name} (${u.class_id})`; }

        loadGitHubCredentials();
    </script>
</body>
</html>
