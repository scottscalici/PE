<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Syllabus & Rosters</title>
    <style>
        :root { --primary: #0056b3; --bg-color: #f4f7f6; --card-bg: #ffffff; --text-main: #333333; --accent: #e9ecef; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: transparent; color: var(--text-main); margin: 0; padding: 10px; }
        
        /* Navigation */
        .class-nav { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
        .btn-class { background: var(--card-bg); border: 2px solid var(--primary); color: var(--primary); padding: 10px 20px; font-size: 1.1em; font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .btn-class:hover, .btn-class.active { background: var(--primary); color: white; }

        /* Panels & Collapsibles */
        .panel { background: var(--card-bg); padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        details { border: 1px solid #ddd; border-radius: 6px; margin-bottom: 10px; background: #fff; }
        summary { padding: 15px; font-weight: bold; cursor: pointer; background: var(--accent); display: flex; justify-content: space-between; align-items: center; list-style: none; }
        summary::-webkit-details-marker { display: none; }
        summary::after { content: '▼'; font-size: 0.8em; color: var(--primary); }
        details[open] summary::after { content: '▲'; }
        .details-content { padding: 15px; border-top: 1px solid #ddd; }

        /* Unit Page Specifics */
.unit-header-container { 
    width: 100%; 
    height: 300px; /* Adjust this height to your preference */
    background: #000; 
    border-radius: 8px; 
    overflow: hidden; 
    margin-bottom: 20px; 
}

.unit-header-img { 
    width: 100%; 
    height: 100%; 
    object-fit: cover; /* This makes it stretch across the full width */
    object-position: center; 
}        
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; margin-top: 10px; border-radius: 6px; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* Team Logos */
        .team-logo-sm { width: 24px; height: 24px; object-fit: contain; vertical-align: middle; margin: 0 5px; }
        .team-logo-md { width: 60px; height: 60px; object-fit: contain; display: block; margin: 0 auto 5px; }

        /* Schedule */
        .match-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; }
        .match-row:hover { background: #f0f7ff; }
        .team-display { display: flex; align-items: center; gap: 8px; flex: 1; font-weight: bold; }

        /* Modal */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 25px; border-radius: 12px; max-width: 500px; width: 90%; position: relative; max-height: 85vh; overflow-y: auto; }
        .close-modal { position: absolute; right: 15px; top: 10px; font-size: 28px; cursor: pointer; }

        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
    </style>
</head>
<body>

    <div class="class-nav" id="classNav">
        <button class="btn-class active" onclick="showSyllabus()">Unit Plan</button>
    </div>

    <div id="syllabusView" class="panel">
        <div id="unitHeader" class="unit-header-container"></div>
        <h1 id="unitTitle" style="text-align: center; color: var(--primary);"></h1>
        
        <details open>
            <summary>📋 Game Rules & Equipment</summary>
            <div class="details-content">
                <h3>🎒 Equipment</h3> <ul id="equipList"></ul>
                <h3>📜 Rules</h3> <ul id="rulesList"></ul>
            </div>
        </details>

        <details>
            <summary>📅 Daily Plan</summary>
            <div class="details-content" id="unitPlanContainer"></div>
        </details>

        <details>
            <summary>🗣️ Vocab & Discussion</summary>
            <div class="details-content">
                <h3>Vocabulary</h3> <ul id="vocabList"></ul>
                <h3>Discussion Topics</h3> <ul id="discussionList"></ul>
            </div>
        </details>

        <details>
            <summary>🌎 Global Connections & Highlights</summary>
            <div class="details-content" id="highlightsContent"></div>
        </details>
    </div>

    <div id="classView" style="display: none;">
        <div class="panel">
            <details open><summary>🏆 Standings</summary><div class="details-content"><table><thead><tr><th>Rk</th><th>Team</th><th>W-L-T</th><th>PTS</th></tr></thead><tbody id="standingsBody"></tbody></table></div></details>
            <details open><summary>🗓️ Schedule</summary><div class="details-content" id="scheduleContainer"></div></details>
            <details><summary>📋 Rosters</summary><div class="details-content"><div id="rostersGrid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;"></div></div></details>
        </div>
    </div>

    <div id="teamModal" class="modal"><div class="modal-content"><span class="close-modal" onclick="closeModal()">&times;</span><div id="modalBody"></div></div></div>

    <script>
        const REPO_BASE_URL = "https://raw.githubusercontent.com/scottscalici/PE/main";
        const SPORT_ID = "handball"; 
        const CLASSES = [{ display: "Class 3A", prefix: "handball_3a" }, { display: "Class 3B", prefix: "handball_3b" }];

        let unitData = null;
        let currentTeams = [];
        let currentSchedule = null;

        window.onload = async () => { buildNavButtons(); await fetchSyllabus(); };

        function buildNavButtons() {
            const nav = document.getElementById('classNav');
            CLASSES.forEach(c => {
                const btn = document.createElement('button');
                btn.className = 'btn-class';
                btn.innerText = c.display;
                btn.onclick = (e) => loadClassData(c.prefix, e.target);
                nav.appendChild(btn);
            });
        }

async function fetchSyllabus() {
    const res = await fetch(`${REPO_BASE_URL}/teams/${SPORT_ID}/${SPORT_ID}.json?t=${Date.now()}`);
    unitData = await res.json();
    
    // 1. Header & Title
    if(unitData.header_image) {
        document.getElementById('unitHeader').innerHTML = `<img src="${unitData.header_image}" class="unit-header-img">`;
    }
    document.getElementById('unitTitle').innerText = unitData.display_name || "Unit Plan";

    // 2. Equipment & Rules
    const equipList = document.getElementById('equipList');
    const rulesList = document.getElementById('rulesList');
    let hasEquip = unitData.equipment && unitData.equipment.length > 0;
    let hasRules = unitData.rules && unitData.rules.length > 0;
    
    if (!hasEquip && !hasRules) {
        equipList.closest('details').style.display = 'none'; // Hides the whole dropdown
    } else {
        if (hasEquip) equipList.innerHTML = unitData.equipment.map(e => `<li>${e}</li>`).join('');
        else equipList.previousElementSibling.style.display = 'none'; // Hides the <h3> tag
        
        if (hasRules) rulesList.innerHTML = unitData.rules.map(r => `<li>${r}</li>`).join('');
        else rulesList.previousElementSibling.style.display = 'none'; // Hides the <h3> tag
    }

    // 3. Vocab & Discussion
    const vocabList = document.getElementById('vocabList');
    const discussionList = document.getElementById('discussionList');
    let hasVocab = unitData.key_terms && unitData.key_terms.length > 0;
    
    // Check if any daily plans actually have discussion questions
    let discussions = (unitData.unit_plan || []).filter(d => d.discussion).map(d => `<li>${d.discussion}</li>`);
    let hasDiscussion = discussions.length > 0;

    if (!hasVocab && !hasDiscussion) {
        vocabList.closest('details').style.display = 'none'; 
    } else {
        if (hasVocab) vocabList.innerHTML = unitData.key_terms.map(v => `<li><strong>${v.term}</strong>: ${v.definition}</li>`).join('');
        else vocabList.previousElementSibling.style.display = 'none';

        if (hasDiscussion) discussionList.innerHTML = discussions.join('');
        else discussionList.previousElementSibling.style.display = 'none';
    }

    // 4. Daily Unit Plan
    let planHtml = "";
    if (unitData.unit_plan && unitData.unit_plan.length > 0) {
        unitData.unit_plan.forEach(d => {
            // Only add Skills and Games if they exist
            let detailsArr = [];
            if (d.skills) detailsArr.push(`<strong>Skills:</strong> ${d.skills}`);
            if (d.games) detailsArr.push(`<strong>Games:</strong> ${d.games}`);
            
            // Join them with a " | " only if there's more than one
            let detailsHtml = detailsArr.length > 0 ? `<p style="font-size: 0.9em; margin: 5px 0;">${detailsArr.join(' | ')}</p>` : '';

            planHtml += `
                <div style="border-bottom: 2px solid #eee; padding: 15px 0;">
                    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
                        <div>
                            <strong>Day ${d.day}${d.topic ? `: ${d.topic}` : ''}</strong>
                            ${detailsHtml}
                        </div>
                        ${d.workout_iframe ? `
                            <a href="${d.workout_iframe}" target="_blank" style="padding: 10px 15px; background: var(--primary); color: white; border-radius: 6px; text-decoration: none; font-weight: bold; font-size: 0.85em; display: flex; align-items: center; gap: 5px;">
                                🚀 Open Workout
                            </a>
                        ` : ''}
                    </div>
                </div>`;
        });
        document.getElementById('unitPlanContainer').innerHTML = planHtml;
    } else {
        document.getElementById('unitPlanContainer').closest('details').style.display = 'none';
    }

    // 5. Global Connections
    const highlightsContent = document.getElementById('highlightsContent');
    if(unitData.global_connections && (unitData.global_connections.description || unitData.global_connections.highlights_video)) {
        let vidHtml = '';
        if (unitData.global_connections.highlights_video) {
            let vidId = unitData.global_connections.highlights_video.split('v=')[1];
            if (vidId) {
                vidHtml = `<div class="video-container"><iframe src="https://www.youtube.com/embed/${vidId}" frameborder="0" allowfullscreen></iframe></div>`;
            }
        }
        let descHtml = unitData.global_connections.description ? `<p>${unitData.global_connections.description}</p>` : '';
        highlightsContent.innerHTML = descHtml + vidHtml;
    } else {
        highlightsContent.closest('details').style.display = 'none';
    }
}

        function getLogo(teamName) {
            if (!teamName || !unitData.available_teams) return '';
            
            // 1. Try exact match
            let team = unitData.available_teams.find(t => t.display === teamName);
            
            // 2. Try fuzzy match (e.g. "Wild Boys" matches "Stuttgart Wild Boys")
            if (!team) {
                team = unitData.available_teams.find(t => 
                    t.display.toLowerCase().includes(teamName.toLowerCase()) || 
                    teamName.toLowerCase().includes(t.display.toLowerCase())
                );
            }
            return team ? `${REPO_BASE_URL}/teams/${SPORT_ID}/${team.logo}` : 'data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=';
        }

        async function loadClassData(prefix, btn) {
            document.querySelectorAll('.btn-class').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('syllabusView').style.display = 'none';
            document.getElementById('classView').style.display = 'block';

            const rostersGrid = document.getElementById('rostersGrid');
            const standingsBody = document.getElementById('standingsBody');
            const scheduleContainer = document.getElementById('scheduleContainer');
            
            rostersGrid.innerHTML = "Loading...";
            standingsBody.innerHTML = "<tr><td colspan='4'>Loading...</td></tr>";
            scheduleContainer.innerHTML = "Loading...";

            try {
                const [tRes, sRes] = await Promise.all([
                    fetch(`${REPO_BASE_URL}/units/${prefix}_teams.json?t=${Date.now()}`),
                    fetch(`${REPO_BASE_URL}/units/${prefix}_schedule.json?t=${Date.now()}`)
                ]);

                if (!tRes.ok) throw new Error(`Could not fetch ${prefix}_teams.json`);
                if (!sRes.ok) throw new Error(`Could not fetch ${prefix}_schedule.json`);

                currentTeams = (await tRes.json()).baseTeams;
                currentSchedule = await sRes.json();

                renderStandings(); 
                renderSchedule(); 
                renderRosters();
            } catch (err) {
                console.error(err);
                standingsBody.innerHTML = `<tr><td colspan='4' style='color:red;'>🚨 <b>Error:</b> ${err.message}. (If it says "Unexpected token", there is a missing comma or bracket in your JSON file on GitHub!)</td></tr>`;
                scheduleContainer.innerHTML = "";
                rostersGrid.innerHTML = "";
            }
        }
        function renderStandings() {
            let sorted = [...currentTeams].sort((a,b) => (currentSchedule.standings[b.name]?.pts || 0) - (currentSchedule.standings[a.name]?.pts || 0));
            document.getElementById('standingsBody').innerHTML = sorted.map((t, i) => {
                let s = currentSchedule.standings[t.name] || {w:0, l:0, t:0, pts:0};
                return `<tr><td>${i+1}</td><td><img src="${getLogo(t.name)}" class="team-logo-sm"> ${t.name}</td><td>${s.w}-${s.l}-${s.t}</td><td><strong>${s.pts}</strong></td></tr>`;
            }).join('');
        }

        function renderSchedule() {
            let html = ""; let dates = {};
            currentSchedule.matches.forEach(m => { if(!dates[m.date_str]) dates[m.date_str] = []; dates[m.date_str].push(m); });
            for(let d in dates) {
                html += `<div style="margin-bottom:15px;"><div style="background:#f0f0f0; padding:8px; font-weight:bold; border-radius:4px;">${d}</div>`;
                dates[d].forEach(m => {
                    html += `<div class="match-row" onclick="showTeamInfo('${m.home_team}', '${m.away_team}')">
                        <div class="team-display"><img src="${getLogo(m.home_team)}" class="team-logo-sm"> ${m.home_team}</div>
                        <div style="color:var(--primary); font-weight:bold;">${m.completed ? m.home_score + '-' + m.away_score : 'vs'}</div>
                        <div class="team-display" style="justify-content:flex-end;">${m.away_team} <img src="${getLogo(m.away_team)}" class="team-logo-sm"></div>
                    </div>`;
                });
                html += `</div>`;
            }
            document.getElementById('scheduleContainer').innerHTML = html;
        }

        function renderRosters() {
            document.getElementById('rostersGrid').innerHTML = currentTeams.map(t => `
                <div style="border: 1px solid #ddd; border-radius: 8px; padding: 15px; text-align:center;">
                    <img src="${getLogo(t.name)}" class="team-logo-md">
                    <strong style="color:var(--primary); font-size:1.1em;">${t.name}</strong>
                    <ul style="font-size:0.9em; text-align:left; margin-top:10px;">${t.players.map(p => `<li>${p.name}</li>`).join('')}</ul>
                </div>`).join('');
        }

        function showTeamInfo(n1, n2) {
            const t1 = currentTeams.find(t => t.name === n1);
            const t2 = currentTeams.find(t => t.name === n2);
            let h = `<h2>Matchup Rosters</h2>`;
            if(t1) h += `<h3><img src="${getLogo(t1.name)}" class="team-logo-sm"> ${t1.name}</h3><ul>${t1.players.map(p => `<li>${p.name}</li>`).join('')}</ul>`;
            if(t2) h += `<h3><img src="${getLogo(t2.name)}" class="team-logo-sm"> ${t2.name}</h3><ul>${t2.players.map(p => `<li>${p.name}</li>`).join('')}</ul>`;
            document.getElementById('modalBody').innerHTML = h;
            document.getElementById('teamModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('teamModal').style.display = 'none'; }
        function showSyllabus() { 
            document.getElementById('classView').style.display='none'; 
            document.getElementById('syllabusView').style.display='block';
            document.querySelectorAll('.btn-class').forEach(b => b.classList.remove('active'));
            document.querySelector('.btn-class').classList.add('active');
        }
    </script>
</body>
</html>
