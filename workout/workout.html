<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Industrial Workout Player</title>
    <style>
        /* Industrial Aesthetic Styling */
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Arial Black', Impact, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: repeating-linear-gradient(45deg, #1a1a1a 25%, transparent 25%, transparent 75%, #1a1a1a 75%, #1a1a1a), repeating-linear-gradient(45deg, #1a1a1a 25%, #121212 25%, #121212 75%, #1a1a1a 75%, #1a1a1a);
            background-size: 20px 20px;
        }

        #app-container {
            width: 90%;
            max-width: 1000px;
            height: 85vh;
            background: linear-gradient(135deg, #2a2a2a, #111);
            border: 6px solid #444;
            border-radius: 12px;
            position: relative;
            box-shadow: inset 0 0 30px #000, 0 10px 30px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top: Current Exercise */
        #current-exercise-container {
            text-align: center;
            padding: 40px 20px;
            background: rgba(0, 0, 0, 0.4);
            border-bottom: 2px solid #333;
        }
        
        #current-exercise {
            font-size: 5rem;
            text-transform: uppercase;
            color: #d4d4d4; 
            text-shadow: 3px 3px 5px #000;
            margin: 0;
            letter-spacing: 3px;
        }

        /* Middle: Next Up */
        #up-next-container {
            flex-grow: 1;
            padding: 30px;
            text-align: center;
        }

        #up-next-container h3 {
            color: #777;
            text-transform: uppercase;
            font-size: 1.5rem;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        #next-list {
            list-style: none;
            padding: 0;
            margin: 0;
            font-size: 2rem;
            color: #999;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bold;
        }

        #next-list li {
            margin-bottom: 10px;
        }

        /* Bottom Left: Safety Cues */
        #safety-cues {
            position: absolute;
            bottom: 30px;
            left: 30px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px 25px;
            border-left: 6px solid #ff5722;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 1.5rem;
            color: #fff;
            max-width: 50%;
            display: none; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.6);
        }

        /* Bottom Right: Timer Widget */
        #timer-widget {
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 280px;
            background: #0a0a0a;
            border: 4px solid #555;
            border-radius: 8px;
            padding: 15px 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.9);
            text-align: center;
        }

        .timer-label {
            font-size: 1rem;
            color: #777;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: -5px;
        }

        #total-time-display {
            font-size: 4.5rem;
            color: #fff;
            margin-bottom: 10px;
            font-family: monospace;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        /* Shrinking Bar Area */
        #progress-header {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            color: #aaa;
            margin-bottom: 5px;
            font-family: Arial, Helvetica, sans-serif;
        }

        #progress-track {
            width: 100%;
            height: 25px;
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: inset 0 0 10px #000;
        }

        #progress-fill {
            height: 100%;
            width: 100%;
            background: #e0e0e0;
            transition: width 1s linear, background-color 0.5s ease, box-shadow 0.5s ease;
        }

        /* Dynamic Colors */
        .rest-text { color: #ff4500 !important; }
        .glow-orange { 
            background: #ff4500 !important; 
            box-shadow: 0 0 15px #ff4500; 
        }

        /* Start Overlay & Dropdown */
        #start-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        /* Finisher Overlay */
        #finisher-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 20;
        }
        
        #finisher-overlay h1 {
            color: #d4d4d4; 
            font-size: 4rem; 
            text-shadow: 3px 3px 5px #000; 
            margin: 0;
        }

        #finisher-overlay h2 {
            color: #ff4500; 
            font-size: 2.5rem; 
            margin-top: 10px; 
            margin-bottom: 40px; 
            letter-spacing: 2px;
        }

        .finisher-btn-group {
            display: flex; 
            gap: 20px; 
            margin-bottom: 30px;
        }

        select {
            font-family: 'Arial Black', sans-serif;
            font-size: 1.5rem;
            padding: 10px;
            margin-bottom: 20px;
            background: #333;
            color: #fff;
            border: 3px solid #555;
            border-radius: 5px;
            width: 80%;
            max-width: 400px;
        }

        button {
            font-family: 'Arial Black', sans-serif;
            font-size: 2.5rem;
            padding: 20px 40px;
            background: #222;
            color: #d4d4d4;
            border: 4px solid #555;
            cursor: pointer;
            text-transform: uppercase;
            border-radius: 8px;
            transition: 0.3s;
        }

        button:hover { background: #444; border-color: #888; color: #fff; }

        .small-btn {
            font-size: 1.2rem; 
            padding: 10px 20px; 
            background: #111; 
            color: #777; 
            border-color: #333;
        }
    </style>
</head>
<body>

    <div id="app-container">
        
        <div id="start-overlay">
            <h2 id="loading-text" style="color: #fff;">Loading Data...</h2>
            <select id="workout-selector" style="display: none;"></select>
            <button id="start-btn" style="display: none;">START</button>
        </div>

        <div id="current-exercise-container">
            <h1 id="current-exercise">Get Ready</h1>
        </div>

        <div id="up-next-container">
            <h3>Up Next</h3>
            <ul id="next-list"></ul>
        </div>

        <div id="safety-cues"></div>

        <div id="timer-widget" style="display: none;">
            <div class="timer-label">Total Time</div>
            <div id="total-time-display">00:00</div>
            
            <div id="progress-header">
                <span>Current</span>
                <span id="exercise-time-display">00s</span>
            </div>
            <div id="progress-track">
                <div id="progress-fill"></div>
            </div>
        </div>

        <div id="finisher-overlay">
            <h1>WORKOUT COMPLETE</h1>
            <h2>WANT SOME MORE?</h2>
            
            <div class="finisher-btn-group">
                <button onclick="startFinisher('finisher_core')" style="font-size: 1.5rem; padding: 15px 30px;">3-MIN CORE</button>
                <button onclick="startFinisher('finisher_cardio')" style="font-size: 1.5rem; padding: 15px 30px;">3-MIN CARDIO</button>
                <button onclick="startFinisher('finisher_upper')" style="font-size: 1.5rem; padding: 15px 30px;">3-MIN UPPER</button>
            </div>
            
            <button onclick="location.reload()" class="small-btn">NO THANKS (RESET)</button>
        </div>

    </div>

    <script>
        const EXERCISES_URL = 'https://raw.githubusercontent.com/scottscalici/PE/main/workout/exercises.json';
        const WORKOUT_URL = 'https://raw.githubusercontent.com/scottscalici/PE/main/workout/workout_routine.json';

        // --- CONFIGURATION ---
        // To lock this page to a specific workout on Google Sites, enter its ID here (e.g., "alpha_01"). 
        // To show the dropdown menu so kids can choose, leave it empty ("").
        const TARGET_WORKOUT_ID = ""; 
        // ---------------------

        let exerciseDB = {};
        let allWorkouts = [];
        let playlist = []; 
        let currentIndex = 0;
        
        // Timer Variables
        let totalTimeRemaining = 0;
        let exerciseTimeRemaining = 0;
        let timerInterval;

        // 1. Fetch data on load
        async function init() {
            try {
                const [exResponse, woResponse] = await Promise.all([
                    fetch(EXERCISES_URL),
                    fetch(WORKOUT_URL)
                ]);

                const exData = await exResponse.json();
                const woData = await woResponse.json();

                // Map exercises for lookup
                exData.exercises.forEach(ex => { exerciseDB[ex.id] = ex; });
                
                // Store all workouts
                allWorkouts = woData.workouts;

                // Build Dropdown OR Lock to Specific Workout
                const selector = document.getElementById('workout-selector');
                
                if (TARGET_WORKOUT_ID !== "") {
                    // Locked mode: Hide dropdown, prep the specific workout
                    const targetIndex = allWorkouts.findIndex(w => w.id === TARGET_WORKOUT_ID);
                    if (targetIndex !== -1) {
                        selector.value = targetIndex; // Secretly select it
                        document.getElementById('current-exercise').innerText = allWorkouts[targetIndex].workoutName;
                    } else {
                        document.getElementById('current-exercise').innerText = "Workout ID not found!";
                    }
                } else {
                    // Choice mode: Show dropdown
                    allWorkouts.forEach((wo, index) => {
                        let option = document.createElement('option');
                        option.value = index;
                        option.text = wo.workoutName;
                        selector.appendChild(option);
                    });
                    selector.style.display = 'block';
                }

                // Show Start UI
                document.getElementById('loading-text').style.display = 'none';
                document.getElementById('start-btn').style.display = 'block';

                document.getElementById('start-btn').addEventListener('click', prepareWorkout);

            } catch (error) {
                console.error("Failed to load JSON files:", error);
                document.getElementById('loading-text').innerText = "Error Loading GitHub Data. Check Console.";
            }
        }

        // 2. Build the specific playlist when user clicks Start
        function prepareWorkout() {
            const selectedIndex = document.getElementById('workout-selector').value;
            const selectedWorkout = allWorkouts[selectedIndex];
            
            playlist = []; // Reset playlist
            totalTimeRemaining = 0;

            const rounds = selectedWorkout.rounds || 1;
            for (let r = 0; r < rounds; r++) {
                selectedWorkout.circuits.forEach(circuit => {
                    circuit.sequence.forEach(block => {
                        const details = exerciseDB[block.exerciseId] || { name: 'Unknown', safetyCues: '' };
                        playlist.push({
                            ...block,
                            name: details.name,
                            safetyCues: details.safetyCues
                        });
                        totalTimeRemaining += block.duration; // Tally up total time
                    });
                });
            }

            // Hide overlays, show timers, start block 0
            document.getElementById('start-overlay').style.display = 'none';
            document.getElementById('finisher-overlay').style.display = 'none';
            document.getElementById('timer-widget').style.display = 'block';
            runBlock(0);
        }

        // 3. Run individual exercise block
        function runBlock(index) {
            if (index >= playlist.length) {
                finishWorkout();
                return;
            }

            currentIndex = index;
            const currentBlock = playlist[index];
            exerciseTimeRemaining = currentBlock.duration;

            updateUI(currentBlock);

            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                exerciseTimeRemaining--;
                totalTimeRemaining--;
                
                updateTimerDisplay(currentBlock.duration, currentBlock.type);

                if (exerciseTimeRemaining <= 0) {
                    clearInterval(timerInterval);
                    runBlock(index + 1);
                }
            }, 1000);
        }

        // Helper to format MM:SS
        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        function updateUI(block) {
            const titleEl = document.getElementById('current-exercise');
            titleEl.innerText = block.name;

            if (block.type === 'rest') {
                titleEl.classList.add('rest-text');
            } else {
                titleEl.classList.remove('rest-text');
            }

            // Populate "Up Next"
            const nextList = document.getElementById('next-list');
            nextList.innerHTML = '';
            for (let i = 1; i <= 3; i++) {
                if (currentIndex + i < playlist.length) {
                    let nextBlock = playlist[currentIndex + i];
                    let li = document.createElement('li');
                    li.innerText = `${nextBlock.name} - ${nextBlock.duration}s`;
                    nextList.appendChild(li);
                }
            }

            // Safety Cues
            const cuesEl = document.getElementById('safety-cues');
            if (block.safetyCues && block.safetyCues.trim() !== "") {
                cuesEl.innerText = `⚠️ ${block.safetyCues}`;
                cuesEl.style.display = 'block';
            } else {
                cuesEl.style.display = 'none';
            }

            updateTimerDisplay(block.duration, block.type);
        }

        function updateTimerDisplay(totalDuration, type) {
            // Update big master timer
            document.getElementById('total-time-display').innerText = formatTime(Math.max(0, totalTimeRemaining));
            
            // Update subtle exercise timer
            document.getElementById('exercise-time-display').innerText = exerciseTimeRemaining + 's';

            // Shrinking Bar
            const percentage = (exerciseTimeRemaining / totalDuration) * 100;
            const fillEl = document.getElementById('progress-fill');
            fillEl.style.width = percentage + '%';

            // Industrial Glow
            if (type === 'rest' || exerciseTimeRemaining <= 5) {
                fillEl.classList.add('glow-orange');
            } else {
                fillEl.classList.remove('glow-orange');
            }
        }

        function finishWorkout() {
            // Hide the main workout UI
            document.getElementById('timer-widget').style.display = 'none';
            document.getElementById('up-next-container').style.display = 'none';
            document.getElementById('safety-cues').style.display = 'none';
            document.getElementById('current-exercise-container').style.display = 'none';
            
            // Show the Finisher overlay
            document.getElementById('finisher-overlay').style.display = 'flex';
        }

        function startFinisher(finisherId) {
            // Find the finisher workout in your JSON data
            const targetIndex = allWorkouts.findIndex(w => w.id === finisherId);
            
            if (targetIndex !== -1) {
                // Restore main UI visibility
                document.getElementById('current-exercise-container').style.display = 'block';
                document.getElementById('up-next-container').style.display = 'block';
                
                // Secretly change the dropdown value to the finisher and hit 'START' again
                document.getElementById('workout-selector').value = targetIndex;
                prepareWorkout(); 
            } else {
                alert("Hold up! Finisher workout '" + finisherId + "' not found in your JSON yet.");
            }
        }

        init();
    </script>
</body>
</html>
